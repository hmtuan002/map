<script>
    // ==================== CẤU HÌNH API VỚI HÀM ĐẢO KEY ====================
    function getAPIKey() {
        const originalKey = "v6xGqEar3C7yKR9K2GmO5dTZx2OLCg258qLWdF5o7kt5ImQu-ks";
        const reversedKey = originalKey.split('').reverse().join('');
        return reversedKey;
    }

    const API_BASE_URL = "https://api.shopaikey.com/v1";
    const API_CHAT_ENDPOINT = "/chat/completions";
    const API_URL = API_BASE_URL + API_CHAT_ENDPOINT;
    const AI_MODEL = "gpt-5.4-nano";
    
    let mm = null;
    let transformer = null;
    let currentMarkdown = '';
    let currentTopic = '';
    let isGenerating = false;
    let timerInterval = null;
    let startTime = 0;

    // DOM elements
    const searchOverlay = document.getElementById('searchOverlay');
    const mindmapArea = document.getElementById('mindmapArea');
    const initialSearchInput = document.getElementById('initialSearchInput');
    const initialCreateBtn = document.getElementById('initialCreateBtn');
    const mindmapSearchInput = document.getElementById('mindmapSearchInput');
    const mindmapCreateBtn = document.getElementById('mindmapCreateBtn');
    const backToSearchBtn = document.getElementById('backToSearchBtn');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const zoomOutCtrl = document.getElementById('zoomOutCtrl');
    const zoomInCtrl = document.getElementById('zoomInCtrl');
    const loadingArea = document.getElementById('loadingArea');
    const svgElement = document.getElementById('mindmap-svg');

    const colorPalette = ['#ff6b6b', '#ff8e53', '#ffb347', '#4ecdc4', '#45b7d1', '#96ceb4', '#f7b05e', '#e86f6f'];
    
    function getNodeColor(node) {
        if (node.depth === 0) return '#2c3e50';
        return colorPalette[(node.depth - 1) % colorPalette.length];
    }

    // PROMPT TỐI ƯU: YÊU CẦU MINDMAP ÍT NHÁNH
    const HISTORY_PROMPT = `Bạn là chuyên gia sử học Việt Nam. Hãy tạo một mindmarkdown về chủ đề: "{{CONTENT}}".

QUY TẮC CẤU TRÚC:
- Chỉ sử dụng tối đa 5 nhánh cấp 2 (##)
- Mỗi nhánh cấp 2 chỉ có tối đa 4 mục cấp 3 (### hoặc -)
- Dùng emoji phù hợp (không dùng emoji cờ của các quốc gia, không dùng emoji cờ Việt Nam)
- Cấu trúc: # Chủ đề chính (duy nhất)
  ## Nhánh chính 1
  ### Chi tiết 1
  ### Chi tiết 2
  ## Nhánh chính 2 (tối đa 5 nhánh)
- Nội dung bằng TIẾNG VIỆT có dấu, cô đọng, súc tích
- KHÔNG thêm giải thích ngoài markdown. Chỉ xuất markdown thuần.`;

    const DEFAULT_MARKDOWN = `# Lịch Sử Việt Nam
## Thời dựng nước
- Văn Lang - Âu Lạc
- Vua Hùng dựng nước
## Bắc thuộc & Đấu tranh
- Hai Bà Trưng (40)
- Bà Triệu (248)
- Ngô Quyền (938)
## Phong kiến độc lập
- Nhà Lý, Trần, Lê
- Chiến thắng Bạch Đằng
## Cận đại & Hiện đại
- Cách mạng Tháng Tám (1945)
- Điện Biên Phủ (1954)
- Thống nhất đất nước (1975)`;

    // Hàm gọi API với key đã được đảo
    async function callAIToGenerateMindmap(topic) {
        const systemPrompt = HISTORY_PROMPT.replace('{{CONTENT}}', topic);
        const apiKey = getAPIKey(); // Lấy key đã được reverse
        console.log("Đang sử dụng API key (đã reverse):", apiKey.substring(0, 15) + "...");
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: AI_MODEL,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: `Tạo mindmap lịch sử Việt Nam về: ${topic}. Yêu cầu cấu trúc gọn, tối đa 5 nhánh chính.` }
                    ],
                    temperature: 0.6,
                    max_tokens: 2000
                }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            if (data.choices && data.choices[0] && data.choices[0].message) {
                return data.choices[0].message.content;
            }
            throw new Error('Invalid API response');
        } catch (error) {
            console.error('API Error:', error);
            return null;
        }
    }

    // ==================== HÀM LƯU ẢNH ====================
    async function saveMindmapAsImage() {
        try {
            if (!svgElement) { showToast('Không tìm thấy sơ đồ!'); return; }
            const originalSvg = svgElement;
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '-9999px';
            document.body.appendChild(tempContainer);
            const svgClone = originalSvg.cloneNode(true);
            tempContainer.appendChild(svgClone);
            await new Promise(r => setTimeout(r, 100));
            let bbox;
            try { bbox = svgClone.getBBox(); } catch(e) {
                const w = parseFloat(svgClone.getAttribute('width')) || 1200;
                const h = parseFloat(svgClone.getAttribute('height')) || 800;
                bbox = { x: 0, y: 0, width: w, height: h };
            }
            const padding = 50;
            const vw = bbox.width + padding*2, vh = bbox.height + padding*2;
            const vx = bbox.x - padding, vy = bbox.y - padding;
            svgClone.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
            svgClone.setAttribute('width', vw);
            svgClone.setAttribute('height', vh);
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `.markmap-node circle{fill:#ffcdd2!important;stroke:#d32f2f!important;r:8}.markmap-node text{fill:#b71c1c!important;font-size:14px}.markmap-link path{stroke:#d32f2f!important;stroke-width:2.5px}`;
            svgClone.insertBefore(style, svgClone.firstChild);
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            svgString = svgString.replace(/xmlns="http:\/\/www\.w3\.org\/2000\/svg"/, 'xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            canvas.width = vw; canvas.height = vh;
            await new Promise((resolve, reject) => {
                img.onload = () => {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, vw, vh);
                    ctx.drawImage(img, 0, 0, vw, vh);
                    const link = document.createElement('a');
                    const title = currentTopic ? currentTopic.replace(/[^a-zA-Z0-9À-ỹ]/g, '_').substring(0,50) : 'mindmap';
                    link.download = `mindmap_${title}_${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('✅ Lưu ảnh thành công!');
                    resolve();
                };
                img.onerror = reject;
                img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
            });
            document.body.removeChild(tempContainer);
        } catch(e) { console.error(e); showToast('❌ Lỗi lưu ảnh'); }
    }

    function showToast(msg, dur=3000) {
        let t = document.getElementById('toast-message');
        if(!t){ t=document.createElement('div'); t.id='toast-message'; t.className='toast-message'; document.body.appendChild(t); }
        t.textContent = msg;
        t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0px)';
        setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, dur);
    }

    async function initMarkmap() {
        if(mm && transformer) return;
        try {
            await new Promise((res,rej)=>{
                let attempts=0;
                const iv=setInterval(()=>{
                    if(window.markmap?.Transformer && window.markmap?.Markmap){ clearInterval(iv); res(); }
                    else if(++attempts>100) { clearInterval(iv); rej(); }
                },80);
            });
            const { Transformer, Markmap } = window.markmap;
            transformer = new Transformer();
            mm = Markmap.create(svgElement, { duration: 400, spacingVertical: 8, spacingHorizontal: 90, autoFit: true, fitRatio: 0.9, color: getNodeColor });
        } catch(err){ console.error(err); }
    }

    async function renderMindmap(markdown) {
        if(!transformer || !mm) await initMarkmap();
        if(!markdown) return;
        try {
            const { root } = transformer.transform(markdown);
            mm.setData(root);
            setTimeout(()=>{ if(mm && mm.fit) mm.fit(); }, 150);
        } catch(e){ console.error(e); }
    }

    // Hàm tạo mindmap và XÓA nội dung thanh tìm kiếm
    async function generateAndRender(topic, inputElementToClear) {
        if(!topic.trim()){ showToast("Vui lòng nhập chủ đề lịch sử!"); return false; }
        if(isGenerating) return false;
        
        // Xóa dữ liệu tìm kiếm cũ khỏi thanh nhập NGAY LẬP TỨC
        if(inputElementToClear) {
            inputElementToClear.value = '';
        }
        
        isGenerating = true;
        loadingArea.style.display = 'flex';
        startTimer();
        let aiContent = null;
        try {
            aiContent = await callAIToGenerateMindmap(topic);
        } catch(e){ console.warn(e); }
        if(aiContent && aiContent.trim().length > 50) currentMarkdown = aiContent.trim();
        else currentMarkdown = DEFAULT_MARKDOWN;
        await renderMindmap(currentMarkdown);
        stopTimer();
        loadingArea.style.display = 'none';
        isGenerating = false;
        return true;
    }

    function startTimer(){
        startTime = Date.now();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(()=>{
            const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
            const subEl = document.querySelector('.loading-sub');
            if(subEl) subEl.textContent = `⏳ Xử lý: ${elapsed}s | Đang tổng hợp kiến thức`;
        },100);
    }
    function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }

    // Từ màn hình chính
    async function onCreateFromInitial() {
        const query = initialSearchInput.value.trim();
        if(!query){ showToast("Vui lòng nhập nội dung lịch sử!"); return; }
        currentTopic = query;
        searchOverlay.classList.add('hide');
        mindmapArea.classList.add('visible');
        await initMarkmap();
        // Xóa dữ liệu cũ trên thanh tìm kiếm trong mindmap
        mindmapSearchInput.value = '';
        await generateAndRender(query, null);
        // Sau khi tạo xong, thanh tìm kiếm vẫn trống
    }

    // Từ mindmap: xóa nội dung thanh tìm kiếm ngay lập tức
    async function onCreateFromMindmap() {
        const query = mindmapSearchInput.value.trim();
        if(!query){ showToast("Vui lòng nhập chủ đề!"); return; }
        if(isGenerating) return;
        currentTopic = query;
        // Xóa nội dung thanh tìm kiếm NGAY LẬP TỨC trước khi tạo
        mindmapSearchInput.value = '';
        await generateAndRender(query, mindmapSearchInput);
        // Sau khi tạo xong, thanh đã trống
    }

    function backToInitialScreen() {
        if(isGenerating){ isGenerating=false; loadingArea.style.display='none'; stopTimer(); }
        mindmapArea.classList.remove('visible');
        searchOverlay.classList.remove('hide');
        initialSearchInput.value = '';
        initialSearchInput.focus();
        currentMarkdown = '';
        currentTopic = '';
        if(mm && mm.setData) mm.setData(null);
        mindmapSearchInput.value = '';
    }

    function zoomIn(){ if(mm && mm.rescale){ const s = (mm.state?.scale||1)*1.2; mm.rescale(Math.min(s,4)); } }
    function zoomOut(){ if(mm && mm.rescale){ const s = (mm.state?.scale||1)*0.8; mm.rescale(Math.max(s,0.3)); } }

    // Gán sự kiện
    initialCreateBtn.addEventListener('click', onCreateFromInitial);
    mindmapCreateBtn.addEventListener('click', onCreateFromMindmap);
    backToSearchBtn.addEventListener('click', backToInitialScreen);
    saveImageBtn.addEventListener('click', saveMindmapAsImage);
    zoomInCtrl.addEventListener('click', zoomIn);
    zoomOutCtrl.addEventListener('click', zoomOut);
    
    initialSearchInput.addEventListener('keypress', e=>{ if(e.key==='Enter') initialCreateBtn.click(); });
    mindmapSearchInput.addEventListener('keypress', e=>{ if(e.key==='Enter') mindmapCreateBtn.click(); });
    window.addEventListener('resize', ()=>{ if(mindmapArea.classList.contains('visible') && mm && mm.fit) setTimeout(()=>mm.fit(),150); });
    
    initMarkmap().catch(console.warn);
    setTimeout(()=>{ showToast("🎉 Nhập chủ đề lịch sử để khám phá mindmap", 4000); }, 800);
</script>
</body>
</html>
