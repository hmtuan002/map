<script>
    // ==================== CẤU HÌNH API ====================
    const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent';
    const GEMINI_API_KEY = 'AIzaSyA2Bt952LFcBEV-G8fwdhCdk19wW6qX0ZU';

    // ==================== BIẾN TOÀN CỤC ====================
    let mm = null;
    let transformer = null;
    let currentMarkdown = '';
    let currentTopic = '';
    let isGenerating = false;
    let timerInterval = null;
    let startTime = 0;

    // DOM elements
    const searchOverlay = document.getElementById('searchOverlay');
    const mindmapArea = document.getElementById('mindmapArea');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const backToSearchBtn = document.getElementById('backToSearch');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const zoomOutCtrl = document.getElementById('zoomOutCtrl');
    const zoomInCtrl = document.getElementById('zoomInCtrl');
    const loadingArea = document.getElementById('loadingArea');
    const svgElement = document.getElementById('mindmap-svg');

    const colorPalette = ['#ff6b6b', '#ff8e53', '#ffb347', '#4ecdc4', '#45b7d1', '#96ceb4', '#f7b05e', '#e86f6f'];
    
    function getNodeColor(node) {
        if (node.depth === 0) return '#2c3e50';
        return colorPalette[(node.depth - 1) % colorPalette.length];
    }

    const HISTORY_PROMPT = `Bạn là một chuyên gia sử học Việt Nam. Hãy tạo mindmap chi tiết về: "{{CONTENT}}".

Yêu cầu:
1. Cấu trúc: # Chủ đề chính, ## Sự kiện, - Chi tiết
2. Dùng emoji phù hợp nhưng không được dùng emoji cờ các nước, tiếng Việt có dấu
3. Chỉ xuất Markdown thuần, không giải thích thêm`;

    const DEFAULT_MARKDOWN = `# Lịch Sử Việt Nam

## 📜 Thời kỳ Hùng Vương
### Vua Hùng
- 18 đời vua Hùng
- Kinh đô: Phong Châu

## ⚔️ Thời kỳ chống Bắc thuộc
### Hai Bà Trưng (40-43)
- Trưng Trắc, Trưng Nhị

## 🏆 Thời phong kiến độc lập
### Nhà Lý (1009-1225)
- Lý Thái Tổ dời đô

## 🎉 Thời đại chống Pháp
### Cách mạng tháng Tám (1945)
### Chiến thắng Điện Biên Phủ (1954)`;

    // ==================== HÀM LƯU SƠ ĐỒ THÀNH ẢNH PNG (ĐÃ SỬA LỖI) ====================
    async function saveMindmapAsImage() {
        try {
            // Kiểm tra sự tồn tại của SVG
            if (!svgElement) {
                showToast('Không tìm thấy sơ đồ để lưu!');
                return;
            }
            
            // Lấy SVG element gốc
            const originalSvg = svgElement;
            
            // Tạo một container tạm thời để clone SVG
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '-9999px';
            document.body.appendChild(tempContainer);
            
            // Clone SVG element
            const svgClone = originalSvg.cloneNode(true);
            tempContainer.appendChild(svgClone);
            
            // Đợi một chút để đảm bảo clone hoàn tất
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // Lấy kích thước thực tế của SVG
            let bbox;
            try {
                bbox = svgClone.getBBox();
            } catch (e) {
                // Nếu không lấy được bbox, dùng kích thước từ thuộc tính
                const width = parseFloat(svgClone.getAttribute('width')) || 1200;
                const height = parseFloat(svgClone.getAttribute('height')) || 800;
                bbox = { x: 0, y: 0, width: width, height: height };
            }
            
            const padding = 50;
            const viewBoxWidth = bbox.width + padding * 2;
            const viewBoxHeight = bbox.height + padding * 2;
            const viewBoxX = bbox.x - padding;
            const viewBoxY = bbox.y - padding;
            
            // Thiết lập viewBox và kích thước cho SVG clone
            svgClone.setAttribute('viewBox', `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);
            svgClone.setAttribute('width', viewBoxWidth);
            svgClone.setAttribute('height', viewBoxHeight);
            
            // Thêm style để cải thiện giao diện khi lưu
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `
                .markmap-node circle, .markmap-node rect, .markmap-node polygon {
                    fill: #ffebee !important;
                    stroke: #d32f2f !important;
                    stroke-width: 2px !important;
                }
                .markmap-node text {
                    fill: #b71c1c !important;
                    font-family: 'Segoe UI', 'Playfair Display', 'Arial', sans-serif !important;
                    font-size: 14px !important;
                    font-weight: 500 !important;
                }
                .markmap-node.root-node text {
                    font-size: 20px !important;
                    font-weight: 800 !important;
                    fill: #d32f2f !important;
                }
                .markmap-link path {
                    stroke: #d32f2f !important;
                    stroke-width: 2.5px !important;
                }
                .markmap-arrow { 
                    fill: #d32f2f !important;
                }
                .markmap-node circle {
                    fill: #ffcdd2 !important;
                    stroke: #d32f2f !important;
                    r: 8 !important;
                }
            `;
            svgClone.insertBefore(style, svgClone.firstChild);
            
            // Chuyển SVG thành string
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            
            // Xử lý các namespace và encoding
            svgString = svgString.replace(/xmlns="http:\/\/www\.w3\.org\/2000\/svg"/, 'xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"');
            
            // Tạo canvas để chuyển SVG sang PNG
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            canvas.width = viewBoxWidth;
            canvas.height = viewBoxHeight;
            
            // Tạo promise để xử lý việc load ảnh
            const imageLoadPromise = new Promise((resolve, reject) => {
                img.onload = function() {
                    try {
                        // Vẽ nền trắng
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, viewBoxWidth, viewBoxHeight);
                        
                        // Vẽ SVG lên canvas
                        ctx.drawImage(img, 0, 0, viewBoxWidth, viewBoxHeight);
                        
                        // Tạo link tải ảnh
                        const link = document.createElement('a');
                        const title = currentTopic ? currentTopic.replace(/[^a-zA-Z0-9À-ỹ]/g, '_').substring(0, 50) : 'mindmap';
                        const timestamp = new Date().getTime();
                        link.download = `mindmap_${title}_${timestamp}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        
                        showToast('✅ Đã lưu ảnh sơ đồ tư duy thành công!');
                        resolve();
                    } catch (err) {
                        reject(err);
                    } finally {
                        // Dọn dẹp container tạm
                        document.body.removeChild(tempContainer);
                    }
                };
                
                img.onerror = function(error) {
                    console.error('Lỗi khi tải SVG:', error);
                    reject(new Error('Không thể tải SVG'));
                    document.body.removeChild(tempContainer);
                };
            });
            
            // Encode SVG string thành data URL
            const encodedSvg = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
            img.src = encodedSvg;
            
            // Đợi ảnh load xong
            await imageLoadPromise;
            
        } catch (error) {
            console.error('Lỗi trong saveMindmapAsImage:', error);
            showToast('❌ Lỗi khi lưu ảnh: ' + (error.message || 'Vui lòng thử lại!'));
        }
    }

    // ==================== HIỂN THỊ THÔNG BÁO ====================
    function showToast(message, duration = 3000) {
        let toast = document.getElementById('toast-message');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-message';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0px)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
        }, duration);
    }

    // ==================== KHỞI TẠO MARKMAP ====================
    async function initMarkmap() {
        if (mm && transformer) return;
        try {
            await waitForLibraries();
            const { Transformer, Markmap } = window.markmap;
            transformer = new Transformer();
            mm = Markmap.create(svgElement, {
                duration: 400,
                nodeMinHeight: 20,
                spacingVertical: 8,
                spacingHorizontal: 90,
                autoFit: true,
                fitRatio: 0.9,
                color: getNodeColor,
            });
        } catch (err) {
            console.error("Init markmap error:", err);
        }
    }

    function waitForLibraries() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const maxAttempts = 100;
            const interval = setInterval(() => {
                attempts++;
                if (window.markmap && window.markmap.Transformer && window.markmap.Markmap) {
                    clearInterval(interval);
                    resolve();
                } else if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    reject(new Error("Không thể tải thư viện markmap"));
                }
            }, 80);
        });
    }

    async function renderCurrentMindmap() {
        if (!transformer || !mm) {
            await initMarkmap();
        }
        if (!currentMarkdown) return;
        try {
            const { root } = transformer.transform(currentMarkdown);
            mm.setData(root);
            setTimeout(() => {
                if (mm && mm.fit) mm.fit();
            }, 150);
        } catch (err) {
            console.error("Render error:", err);
        }
    }

    // ==================== GỌI AI ====================
    function startTimer() {
        startTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const timerEl = document.querySelector('.loading-sub');
            if (timerEl) timerEl.textContent = `Đã xử lý: ${elapsed}s | Đang tổng hợp thông tin...`;
        }, 100);
    }

    function stopTimer() {
        if (timerInterval) { 
            clearInterval(timerInterval); 
            timerInterval = null; 
        }
    }

    async function generateMindmap(topic) {
        if (!topic.trim()) { 
            showToast("Vui lòng nhập nội dung!"); 
            return false; 
        }
        if (isGenerating) return false;
        
        isGenerating = true;
        loadingArea.style.display = 'flex';
        startTimer();
        
        const prompt = HISTORY_PROMPT.replace('{{CONTENT}}', topic);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { 
                        temperature: 0.7, 
                        maxOutputTokens: 3000,
                        topP: 0.95
                    }
                }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                const data = await response.json();
                const markdownContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (markdownContent && markdownContent.trim().length > 30) {
                    currentMarkdown = markdownContent.trim();
                } else {
                    currentMarkdown = DEFAULT_MARKDOWN;
                }
            } else {
                console.warn("API response not OK, using default");
                currentMarkdown = DEFAULT_MARKDOWN;
            }
        } catch (error) {
            console.error("API Error:", error);
            currentMarkdown = DEFAULT_MARKDOWN;
        }
        
        if (!currentMarkdown || currentMarkdown.trim().length === 0) {
            currentMarkdown = DEFAULT_MARKDOWN;
        }
        
        await renderCurrentMindmap();
        
        stopTimer();
        loadingArea.style.display = 'none';
        isGenerating = false;
        return true;
    }

    // ==================== XỬ LÝ TÌM KIẾM ====================
    async function onSearch() {
        const query = searchInput.value.trim();
        if (!query) { 
            showToast("Vui lòng nhập nội dung lịch sử cần tìm hiểu!"); 
            return; 
        }
        currentTopic = query;
        searchOverlay.classList.add('hide');
        mindmapArea.classList.add('visible');
        await initMarkmap();
        await generateMindmap(query);
    }

    function backToSearchMode() {
        if (isGenerating) {
            isGenerating = false;
            loadingArea.style.display = 'none';
            stopTimer();
        }
        mindmapArea.classList.remove('visible');
        searchOverlay.classList.remove('hide');
        searchInput.value = '';
        searchInput.focus();
        currentMarkdown = '';
        currentTopic = '';
        if (mm && mm.setData) {
            mm.setData(null);
        }
    }

    // ==================== ZOOM ====================
    function zoomIn() {
        if (mm && mm.rescale) {
            const currentScale = mm.state?.scale || 1;
            const targetScale = Math.min(currentScale * 1.2, 4);
            mm.rescale(targetScale);
        }
    }
    
    function zoomOut() {
        if (mm && mm.rescale) {
            const currentScale = mm.state?.scale || 1;
            const targetScale = Math.max(currentScale * 0.8, 0.3);
            mm.rescale(targetScale);
        }
    }

    // ==================== GÁN SỰ KIỆN ====================
    if (searchBtn) searchBtn.addEventListener('click', onSearch);
    if (backToSearchBtn) backToSearchBtn.addEventListener('click', backToSearchMode);
    if (zoomInCtrl) zoomInCtrl.addEventListener('click', zoomIn);
    if (zoomOutCtrl) zoomOutCtrl.addEventListener('click', zoomOut);
    if (saveImageBtn) saveImageBtn.addEventListener('click', saveMindmapAsImage);
    if (searchInput) {
        searchInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') searchBtn.click(); 
        });
    }
    
    window.addEventListener('resize', () => {
        if (mindmapArea.classList.contains('visible') && mm && mm.fit) {
            setTimeout(() => mm.fit(), 150);
        }
    });
    
    // Khởi tạo markmap khi trang load
    initMarkmap().catch(console.warn);
    
    // Thêm thông báo chào mừng
    setTimeout(() => {
        showToast("🎉 Chào mừng! Nhập nội dung lịch sử để khám phá sơ đồ tư duy", 4000);
    }, 1000);
</script>
</body>
