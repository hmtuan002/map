<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Bản Đồ Lịch Sử 3D - Quả Địa Cầu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Playfair Display', sans-serif;
            background-color: #000 !important;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        :root {
            --bg-total: #000;
            --input-bg: #F4F7F8;
            --card-bg: rgba(30, 30, 30, 0.95);
            --border-light: rgba(255,255,255,0.1);
            --text-primary: #ffffff;
            --text-secondary: #8A8F95;
            --button-cyan: #6EC6D9;
            --accent-orange: #F4A261;
        }

        #globeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }

        /* Sidebar */
        #sidebar {
            position: absolute;
            left: 0;
            top: 0;
            width: 400px;
            height: 100%;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-light);
            z-index: 20;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }

        #sidebar.sidebar-collapsed {
            transform: translateX(-100%);
        }

        .sidebar-toggle {
            position: absolute;
            top: 20px;
            right: -40px;
            width: 40px;
            height: 40px;
            background-color: var(--accent-orange);
            color: white;
            border-radius: 0 50% 50% 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 21;
            border: 1px solid var(--border-light);
            border-left: none;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
        }

        .sidebar-toggle:hover {
            background-color: #e08e4d;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-title h2 {
            color: var(--accent-orange);
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        .language-switch {
            display: flex;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--input-bg);
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            border: 1px solid var(--border-light);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 3px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            transition: 0.4s;
            z-index: 2;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        .search-wrapper {
            position: relative;
            margin-top: 10px;
        }

        #search-input {
            width: 100%;
            padding: 12px 60px 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background-color: var(--input-bg);
            color: #333;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: none;
            height: 48px;
            overflow: hidden;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .search-button {
            position: absolute;
            top: 50%;
            right: 5px;
            transform: translateY(-50%);
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .search-button:hover {
            background-color: #5db8cc;
        }

        .content-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        #result-messages {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Battle Boxes */
        .battle-box, .history-info-box, .result-container {
            background-color: rgba(20, 20, 20, 0.9);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .close-btn:hover {
            color: var(--accent-orange);
        }

        .battle-box h3 {
            color: var(--accent-orange);
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Image Container */
        .image-container {
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .image-title {
            padding: 10px;
            background-color: rgba(0,0,0,0.3);
            color: var(--accent-orange);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .image-content {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            cursor: pointer;
        }

        .image-container.expanded {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
        }

        .image-container.expanded .image-content {
            max-height: 90vh;
            object-fit: contain;
        }

        /* Mindmap */
        .mindmap-sieu-ngau {
            width: 100%;
            height: 300px;
            background: white;
            border-radius: 12px;
            margin: 15px 0;
            overflow: hidden;
            border: 1px solid var(--border-light);
            cursor: pointer;
        }

        .mindmap-sieu-ngau.expanded {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            margin: 0;
            border-radius: 0;
        }

        .mindmap-title {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mindmap-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: white;
            cursor: pointer;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .mindmap-content {
            height: calc(100% - 50px);
            background: white;
        }

        .mindmap-container {
            width: 100%;
            height: 100%;
        }

        /* Audio Controls */
        .audio-controls {
            margin-top: 15px;
            padding: 15px;
            background-color: rgba(20,20,20,0.9);
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }

        .audio-controls-title {
            color: var(--accent-orange);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-controls-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .audio-controls button {
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .audio-progress {
            flex: 1;
            height: 6px;
            background-color: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
        }

        .audio-progress-bar {
            height: 100%;
            background-color: var(--accent-orange);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Timeline Container - Globe Style */
        .timeline-globe {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 30;
            pointer-events: auto;
        }

        .timeline-bar-globe {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 20px;
            border: 1px solid var(--border-light);
        }

        .timeline-slider-globe {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .timeline-slider-globe::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-orange);
            cursor: pointer;
        }

        .timeline-labels-globe {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 8px;
        }

        .playback-controls-globe {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .playback-btn-globe {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .playback-btn-globe:hover {
            background: rgba(255,255,255,0.2);
        }

        .playback-btn-globe.active {
            background: var(--accent-orange);
        }

        /* Top Bar Globe */
        .top-bar-globe {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 30;
            pointer-events: none;
        }

        .year-pill-globe, .stats-pill-globe {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 24px;
            border: 1px solid var(--border-light);
            color: white;
            font-weight: 500;
            pointer-events: auto;
        }

        /* Layer Panel */
        .layer-panel {
            position: fixed;
            left: 420px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
            pointer-events: auto;
        }

        .layer-btn {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s;
        }

        .layer-btn:hover {
            background: rgba(60, 60, 60, 0.9);
            transform: scale(1.05);
        }

        .layer-btn.active {
            background: var(--accent-orange);
        }

        .layer-btn[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: rgba(0,0,0,0.9);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Map Title Decoration */
        .map-title-decoration {
            position: absolute;
            top: 20px;
            left: 420px;
            z-index: 30;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            color: var(--accent-orange);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            border: 1px solid var(--border-light);
            pointer-events: none;
        }

        .map-title-decoration i {
            margin-right: 8px;
        }

        /* Loading Screens */
        .loading-overlay, .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .loading-overlay.hidden, .loading-screen:not(.active) {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-container {
            text-align: center;
        }

        .loading-text {
            margin-top: 20px;
            color: var(--accent-orange);
            font-size: 1.2rem;
        }

        .loader-info {
            margin-top: 10px;
            color: var(--text-secondary);
        }

        /* Tooltip */
        .territory-tooltip {
            background: rgba(0,0,0,0.9);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            color: white;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
            }
            
            .layer-panel {
                left: 20px;
            }
            
            .map-title-decoration {
                left: 80px;
                font-size: 12px;
                padding: 5px 12px;
            }
            
            .timeline-globe {
                width: 95%;
                bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Loading Overlays -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Đang tải dữ liệu lịch sử...</div>
    </div>
    
    <div class="loading-screen" id="loading-screen">
        <div class="loader-container">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">AI đang tạo nội dung...</div>
            <div class="loader-info">Đang xử lý yêu cầu của bạn...</div>
        </div>
    </div>

    <!-- Globe Container 3D -->
    <div id="globeContainer"></div>
    
    <!-- Top Bar -->
    <div class="top-bar-globe">
        <div class="year-pill-globe" id="yearDisplay">1000 AD</div>
        <div class="stats-pill-globe" id="regionCount">0 quốc gia</div>
    </div>
    
    <!-- Layer Toggles -->
    <div class="layer-panel">
        <button class="layer-btn active" data-layer="borders" data-tooltip="Biên giới">🗺️</button>
    </div>
    
    <!-- Map Title Decoration -->
    <div class="map-title-decoration">
        <i class="fas fa-globe-asia"></i> BẢN ĐỒ LỊCH SỬ 3D
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="fas fa-chevron-left"></i>
        </div>

        <div class="sidebar-header">
            <div class="header-container">
                <div class="header-title">
                    <h2 class="flex items-center">
                        <i class="fas fa-crown mr-3 text-accent"></i>
                        <span class="text-accent">Bản Đồ Lịch Sử 3D</span>
                    </h2>
                </div>
                <div class="language-switch">
                    <label class="switch">
                        <input type="checkbox" id="language-toggle">
                        <span class="slider">
                            <span>Vi</span>
                            <span>En</span>
                        </span>
                    </label>
                </div>
            </div>

            <form id="search-form">
                <div class="search-wrapper">
                    <textarea id="search-input" rows="1"
                        placeholder="Nhập sự kiện lịch sử, nhân vật, địa điểm"></textarea>
                    <button type="submit" class="search-button">
                        <i class="fas fa-paper-plane"></i> Gửi
                    </button>
                </div>
            </form>
        </div>

        <div class="content-container">
            <div id="result-messages"></div>
        </div>
    </div>
    
    <!-- Timeline -->
    <div class="timeline-globe">
        <div class="timeline-bar-globe">
            <input type="range" class="timeline-slider-globe" id="timelineSlider" min="0" max="100" value="50">
            <div class="timeline-labels-globe">
                <span>10.000 TCN</span>
                <span>5.000 TCN</span>
                <span>1 CN</span>
                <span>1.000 CN</span>
                <span>2010</span>
            </div>
            <div class="playback-controls-globe">
                <button class="playback-btn-globe" id="prevBtn">⏮</button>
                <button class="playback-btn-globe" id="playBtn">▶️</button>
                <button class="playback-btn-globe" id="nextBtn">⏭</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/globe.gl@2.45.0/dist/globe.gl.min.js"></script>

    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
    <script src="https://unpkg.com/markmap-lib@0.15.3/dist/browser/index.js"></script>
    <script src="https://unpkg.com/markmap-view@0.15.3/dist/browser/index.js"></script>

        function renderBorders(geojson, year) {
            if (!layers.borders) {
                globe.polygonsData([]);
                document.getElementById('regionCount').textContent = '0 quốc gia';
                return;
            }
            
            const entities = [...new Set(geojson.features.map(f => f.properties.SUBJECTO || f.properties.NAME))];
            
            const polygons = geojson.features.map(f => ({
                ...f,
                color: colorPalette[entities.indexOf(f.properties.SUBJECTO || f.properties.NAME) % colorPalette.length] + '99'
            }));
            
            globe.polygonsData(polygons);
            document.getElementById('regionCount').textContent = `${geojson.features.length} quốc gia`;
            
            updateLabels(geojson);
        }

        function updateLabels(geojson) {
            const labels = [];
            const seen = new Set();
            
            geojson.features.forEach(f => {
                const name = f.properties.SUBJECTO || f.properties.NAME;
                if (!name || seen.has(name)) return;
                
                let coords = f.geometry.coordinates;
                if (f.geometry.type === 'MultiPolygon') {
                    coords = coords[0];
                }
                if (coords && coords[0]) {
                    const ring = coords[0];
                    if (ring.length > 0) {
                        const lats = ring.map(c => c[1]);
                        const lngs = ring.map(c => c[0]);
                        const lat = lats.reduce((a, b) => a + b) / lats.length;
                        const lng = lngs.reduce((a, b) => a + b) / lngs.length;
                        
                        const area = (Math.max(...lats) - Math.min(...lats)) * (Math.max(...lngs) - Math.min(...lngs));
                        if (area > 50) {
                            labels.push({ name, lat, lng });
                            seen.add(name);
                        }
                    }
                }
            });
            
            globe.labelsData(labels);
        }

        async function queryGemini(lat, lng, placeName, year) {
            const yearLabel = year < 0 ? `${Math.abs(year)} TCN` : `${year} CN`;
            
            const prompt = `Bạn là chuyên gia lịch sử. Hãy cung cấp tổng quan về ${placeName} thời kỳ ${yearLabel}:
- Dân tộc/bộ tộc bản địa
- Khu định cư, thành phố
- Kiểm soát chính trị
- Sự kiện/xung đột đáng chú ý
- Hoạt động kinh tế
- Nhân vật lịch sử nổi tiếng

Trả lời ngắn gọn dưới 250 từ, dùng dấu bullet.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.3, maxOutputTokens: 400 }
                })
            });
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No information available';
        }

        // ==================== XỬ LÝ TÌM KIẾM ====================
        async function handleSubmit(e) {
            e.preventDefault();
            stopSpeech();

            const userQuery = searchInput.value.trim();
            if (!userQuery) return;

            clearPreviousData();

            searchInput.value = "";
            showLoadingScreen();

            try {
                let prompt = userQuery;
                let responseType = "general";

                // Check if it's a country query
                for (const country in countryCoordinates) {
                    if (userQuery.toLowerCase().includes(country.toLowerCase())) {
                        const coords = countryCoordinates[country];
                        globe.pointOfView({ lat: coords.lat, lng: coords.lng, altitude: coords.altitude });
                        
                        const box = document.createElement('div');
                        box.className = 'history-info-box';
                        box.innerHTML = `
                            <h2 class="flex items-center">
                                <i class="fas fa-flag mr-2 text-accent"></i> ${country}
                                <span class="close-btn" onclick="this.parentElement.parentElement.remove()">×</span>
                            </h2>
                            <p>${historyData[countryNameMap[country]]?.history[currentLanguage] || 'No information available'}</p>
                        `;
                        resultMessages.appendChild(box);
                        
                        hideLoadingScreen();
                        return;
                    }
                }

                // Check query type
                if (userQuery.toLowerCase().includes('trận') || userQuery.toLowerCase().includes('battle')) {
                    responseType = "battle";
                    prompt = `Provide battle information in JSON format: { "name": "", "time": "", "location": "", "lat": 0, "lng": 0, "summary": "", "troops": "", "tactics": "", "casualties": "", "heroes": [], "outcome": "", "significance": "" }`;
                } else if (userQuery.toLowerCase().includes('nhân vật') || userQuery.toLowerCase().includes('figure')) {
                    responseType = "figure";
                    prompt = `Provide historical figure information in JSON format: { "name": "", "time": "", "location": "", "lat": 0, "lng": 0, "summary": "", "achievements": [], "significance": "" }`;
                }

                const result = await model.generateContent(prompt);
                const response = await result.response;
                let botReply = response.text();

                try {
                    const jsonMatch = botReply.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const data = JSON.parse(jsonMatch[0]);
                        
                        const container = document.createElement('div');
                        container.className = 'result-container';
                        container.innerHTML = `
                            <div class="result-title">
                                <span>${data.name || userQuery}</span>
                                <span class="close-btn" onclick="this.parentElement.parentElement.remove()">×</span>
                            </div>
                            <div class="result-content"></div>
                        `;
                        
                        const content = container.querySelector('.result-content');
                        
                        // Format data based on type
                        if (responseType === "battle") {
                            content.innerHTML = `
                                <div class="battle-box"><h3>⏰ Thời gian</h3><p>${data.time || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>📍 Địa điểm</h3><p>${data.location || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>📝 Tóm tắt</h3><p>${data.summary || 'No summary'}</p></div>
                                <div class="battle-box"><h3>⚔️ Quân số</h3><p>${data.troops || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>🎯 Chiến thuật</h3><p>${data.tactics || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>💔 Thương vong</h3><p>${data.casualties || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>🏆 Kết quả</h3><p>${data.outcome || 'Unknown'}</p></div>
                            `;
                            
                            if (data.lat && data.lng) {
                                globe.pointOfView({ lat: data.lat, lng: data.lng, altitude: 1.5 });
                            }
                        } else {
                            content.innerHTML = `
                                <div class="battle-box"><h3>⏰ Thời gian</h3><p>${data.time || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>📍 Nơi sinh</h3><p>${data.location || 'Unknown'}</p></div>
                                <div class="battle-box"><h3>📝 Tiểu sử</h3><p>${data.summary || 'No summary'}</p></div>
                                <div class="battle-box"><h3>🏆 Thành tựu</h3><ul>${(data.achievements || []).map(a => `<li>${a}</li>`).join('')}</ul></div>
                            `;
                            
                            if (data.lat && data.lng) {
                                globe.pointOfView({ lat: data.lat, lng: data.lng, altitude: 1.5 });
                            }
                        }
                        
                        resultMessages.appendChild(container);
                        
                        // Add mindmap
                        const mindmapDiv = createMindmapContainerSieuNgau(data.name || userQuery, "🧠 SƠ ĐỒ TƯ DUY");
                        content.appendChild(mindmapDiv);
                        
                        const markdown = responseType === "battle" ? generateBattleMarkdown(data) : generateFigureMarkdown(data);
                        await renderMarkmap(mindmapDiv, markdown);
                        
                        // Add audio controls
                        const narration = generateNarrationText(data);
                        content.appendChild(createAudioControls(narration, data.name || userQuery));
                    }
                } catch (e) {
                    addMessageToUI("assistant", botReply);
                }
            } catch (error) {
                console.error("Error:", error);
                addMessageToUI("assistant", translations[currentLanguage].processing_error);
            } finally {
                hideLoadingScreen();
            }
        }

        // ==================== MARKMAP FUNCTIONS ====================
        function createMindmapContainerSieuNgau(title, mindmapTitle) {
            const div = document.createElement('div');
            div.className = 'mindmap-sieu-ngau';
            div.innerHTML = `
                <div class="mindmap-title">
                    <span>${mindmapTitle}: ${title}</span>
                    <div class="mindmap-controls">
                        <button class="control-btn zoom-in"><i class="fas fa-search-plus"></i></button>
                        <button class="control-btn zoom-out"><i class="fas fa-search-minus"></i></button>
                        <button class="control-btn save-image"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                <div class="mindmap-content">
                    <div class="loading-mindmap">Đang tạo sơ đồ...</div>
                </div>
            `;
            
            div.addEventListener('click', function(e) {
                if (e.target === this || e.target.closest('.mindmap-title')) {
                    this.classList.toggle('expanded');
                    setTimeout(() => this.mm?.fit(), 100);
                }
            });
            
            return div;
        }

        function generateBattleMarkdown(data) {
            return `# ⚔️ ${data.name || 'Trận chiến'}\n\n` +
                `## ⏰ Thời gian\n- ${data.time || 'Unknown'}\n\n` +
                `## 📍 Địa điểm\n- ${data.location || 'Unknown'}\n\n` +
                `## 📝 Tóm tắt\n- ${data.summary || 'No summary'}\n\n` +
                `## ⚔️ Quân số\n- ${data.troops || 'Unknown'}\n\n` +
                `## 🎯 Chiến thuật\n- ${data.tactics || 'Unknown'}\n\n` +
                `## 💔 Thương vong\n- ${data.casualties || 'Unknown'}\n\n` +
                `## 🦸 Anh hùng\n${(data.heroes || []).map(h => `- ✨ ${h}`).join('\n')}\n\n` +
                `## 🏆 Kết quả\n- ${data.outcome || 'Unknown'}\n\n` +
                `## 🌟 Ý nghĩa\n- ${data.significance || 'Unknown'}`;
        }

        function generateFigureMarkdown(data) {
            return `# 👑 ${data.name || 'Nhân vật'}\n\n` +
                `## ⏰ Thời gian\n- ${data.time || 'Unknown'}\n\n` +
                `## 📍 Nơi sinh\n- ${data.location || 'Unknown'}\n\n` +
                `## 📝 Tiểu sử\n- ${data.summary || 'No summary'}\n\n` +
                `## 🏆 Thành tựu\n${(data.achievements || []).map(a => `- ✨ ${a}`).join('\n')}\n\n` +
                `## 🌟 Ý nghĩa\n- ${data.significance || 'Unknown'}`;
        }

        async function renderMarkmap(container, markdown) {
            try {
                const contentDiv = container.querySelector('.mindmap-content');
                const mindmapContainer = document.createElement('div');
                mindmapContainer.className = 'mindmap-container';
                contentDiv.innerHTML = '';
                contentDiv.appendChild(mindmapContainer);
                
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', '100%');
                svg.setAttribute('height', '100%');
                mindmapContainer.appendChild(svg);
                
                const { root } = transformer.transform(markdown);
                const { Markmap } = window.markmap;
                const mm = Markmap.create(svg, {
                    duration: 500,
                    nodeMinHeight: 16,
                    spacingVertical: 5,
                    spacingHorizontal: 80,
                    autoFit: true
                }, root);
                
                container.mm = mm;
                
                container.querySelector('.zoom-in').addEventListener('click', (e) => {
                    e.stopPropagation();
                    mm.rescale(1.2);
                });
                
                container.querySelector('.zoom-out').addEventListener('click', (e) => {
                    e.stopPropagation();
                    mm.rescale(0.8);
                });
                
                container.querySelector('.save-image').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const svg = container.querySelector('svg');
                    const svgData = new XMLSerializer().serializeToString(svg);
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        const link = document.createElement('a');
                        link.download = 'mindmap.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    };
                    img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
                });
                
                setTimeout(() => mm.fit(), 100);
            } catch (error) {
                console.error('Markmap error:', error);
                container.querySelector('.mindmap-content').innerHTML = '<div class="mindmap-error">Lỗi tạo sơ đồ</div>';
            }
        }

        // ==================== AUDIO FUNCTIONS ====================
        function generateNarrationText(data) {
            if (data.factions) { // Battle
                return `Trận ${data.name} diễn ra vào ${data.time} tại ${data.location}. ` +
                    `Quân số: ${data.troops}. Chiến thuật: ${data.tactics}. ` +
                    `Thương vong: ${data.casualties}. Kết quả: ${data.outcome}. ` +
                    `Ý nghĩa: ${data.significance}`;
            } else { // Figure
                return `Nhân vật ${data.name} sống vào ${data.time}. ` +
                    `Nơi sinh: ${data.location}. ${data.summary} ` +
                    `Thành tựu: ${(data.achievements || []).join(', ')}. ` +
                    `Ý nghĩa: ${data.significance}`;
            }
        }

        function createAudioControls(text, title) {
            const controls = document.createElement('div');
            controls.className = 'audio-controls';
            controls.innerHTML = `
                <div class="audio-controls-title">
                    <i class="fas fa-volume-up"></i> Thuyết minh
                </div>
                <div class="audio-controls-buttons">
                    <button class="play-audio"><i class="fas fa-play"></i></button>
                    <button class="pause-audio" disabled><i class="fas fa-pause"></i></button>
                    <button class="stop-audio"><i class="fas fa-stop"></i></button>
                    <div class="audio-progress">
                        <div class="audio-progress-bar"></div>
                    </div>
                </div>
            `;
            
            controls.querySelector('.play-audio').addEventListener('click', () => playSpeech(text, controls));
            controls.querySelector('.pause-audio').addEventListener('click', pauseSpeech);
            controls.querySelector('.stop-audio').addEventListener('click', stopSpeech);
            
            return controls;
        }

        function playSpeech(text, controls) {
            stopSpeech();
            
            currentSpeechText = text;
            speechSynthesisUtterance = new SpeechSynthesisUtterance(text);
            speechSynthesisUtterance.lang = currentLanguage === 'vi' ? 'vi-VN' : 'en-US';
            speechSynthesisUtterance.rate = 0.9;
            
            const playBtn = controls.querySelector('.play-audio');
            const pauseBtn = controls.querySelector('.pause-audio');
            const stopBtn = controls.querySelector('.stop-audio');
            const progressBar = controls.querySelector('.audio-progress-bar');
            
            playBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            
            let startTime = Date.now();
            const totalDuration = text.length / 15; // Approximate
            
            speechProgressInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                const progress = Math.min(elapsed / totalDuration, 1) * 100;
                progressBar.style.width = `${progress}%`;
                
                if (progress >= 100) stopSpeech();
            }, 100);
            
            speechSynthesisUtterance.onend = stopSpeech;
            speechSynthesis.speak(speechSynthesisUtterance);
            isSpeaking = true;
        }

        function pauseSpeech() {
            if (isSpeaking) {
                speechSynthesis.pause();
                isSpeaking = false;
                
                document.querySelectorAll('.play-audio').forEach(btn => btn.disabled = false);
                document.querySelectorAll('.pause-audio').forEach(btn => btn.disabled = true);
                
                clearInterval(speechProgressInterval);
            }
        }

        function stopSpeech() {
            if (speechSynthesisUtterance) {
                speechSynthesis.cancel();
                isSpeaking = false;
                
                document.querySelectorAll('.play-audio').forEach(btn => btn.disabled = false);
                document.querySelectorAll('.pause-audio, .stop-audio').forEach(btn => btn.disabled = true);
                document.querySelectorAll('.audio-progress-bar').forEach(bar => bar.style.width = '0%');
                
                clearInterval(speechProgressInterval);
            }
        }

        function addMessageToUI(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="battle-box">${content}</div>`;
            resultMessages.appendChild(div);
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', initApp);
        
        // Expose functions globally
        window.toggleSidebar = toggleSidebar;
    </script>
</body>
