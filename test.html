        };
        
        function updateLanguage(lang) {
            currentLanguage = lang;
            searchInput.placeholder = translations[lang].search_placeholder;
            document.getElementById('mainTitleText').textContent = translations[lang].title;
            langLabel.textContent = lang === 'vi' ? 'Vi' : 'En';
            compactLangToggle.classList.toggle('active', lang === 'en');
        }
        
        function toggleLang() { updateLanguage(currentLanguage === 'vi' ? 'en' : 'vi'); }
        
        function showLoading(show) { loadingScreen.classList.toggle('active', show); }
        
        async function loadYear(index) {
            if (index < 0 || index >= availableYears.length) return;
            currentYearIndex = index;
            const yearData = availableYears[index];
            yearDisplay.textContent = yearData.label;
            timelineSlider.value = (index / (availableYears.length - 1)) * 100;
            if (!dataCache[yearData.file]) {
                try {
                    const resp = await fetch(`data/geojson/${yearData.file}`);
                    if (!resp.ok) throw new Error();
                    dataCache[yearData.file] = await resp.json();
                } catch(e) { console.error("Lỗi tải GeoJSON", e); return; }
            }
            currentGeoJSON = dataCache[yearData.file];
            if (currentMapMode === '3d' && globe) renderBorders3D();
            else if (currentMapMode === '2d' && leafletMap) renderBorders2D();
        }
        
        function renderBorders3D() {
            if (!globe || !currentGeoJSON) return;
            const features = currentGeoJSON.features;
            const entities = [...new Set(features.map(f => f.properties?.SUBJECTO || f.properties?.NAME || 'unknown'))];
            const polygons = features.map((f, i) => ({ ...f, color: `hsl(${(entities.indexOf(f.properties?.SUBJECTO || f.properties?.NAME) * 45) % 360}, 60%, 65%)` }));
            globe.polygonsData(polygons);
            const labels = features.map(f => {
                const coords = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
                if(!coords) return null;
                let sumLat=0, sumLng=0; coords.slice(0,10).forEach(c => { sumLat+=c[1]; sumLng+=c[0]; });
                return { name: f.properties?.SUBJECTO || f.properties?.NAME, lat: sumLat/coords.length, lng: sumLng/coords.length };
            }).filter(l => l && l.name);
            globe.labelsData(labels);
        }
        
        function renderBorders2D() {
            if (!leafletMap || !currentGeoJSON) return;
            if (window.leafletLayer) leafletMap.removeLayer(window.leafletLayer);
            window.leafletLayer = L.geoJSON(currentGeoJSON, {
                style: { color: '#F4A261', weight: 1.5, fillOpacity: 0.2 },
                onEachFeature: (f, layer) => {
                    const name = f.properties?.SUBJECTO || f.properties?.NAME || 'Đất nước';
                    layer.bindTooltip(name);
                    layer.on('click', () => { 
                        const coords = layer.getBounds().getCenter();
                        handleTerritoryClick2D(name, coords.lat, coords.lng);
                    });
                }
            }).addTo(leafletMap);
        }
        
        function handleTerritoryClick2D(name, lat, lng) { queryLocalHistory(lat, lng, name); }
        
        async function queryLocalHistory(lat, lng, placeName) {
            const year = availableYears[currentYearIndex].year;
            infoPanelTitle.textContent = placeName;
            infoPanelContent.innerHTML = '<div style="text-align:center;padding:20px;">⏳ Đang tra cứu...</div>';
            infoPanel.classList.add('visible');
            try {
                const prompt = `Provide history of ${placeName} around year ${year} in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'}. Keep under 200 words.`;
                const resp = await model.generateContent(prompt);
                const text = resp.response.text();
                infoPanelContent.innerHTML = text.replace(/\n/g, '<br>');
            } catch(e) { infoPanelContent.innerHTML = 'Lỗi tải dữ liệu'; }
        }
        
        function initGlobe3D() {
            globe = Globe()
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .polygonsData([])
                .polygonAltitude(0.01)
                .polygonCapColor(d => d.color)
                .polygonLabel(d => `<div class="territory-tooltip">${d.properties?.SUBJECTO || d.properties?.NAME}</div>`)
                .onPolygonClick((poly, ev, coords) => { const name = poly.properties?.SUBJECTO || poly.properties?.NAME; if(name) queryLocalHistory(coords.lat, coords.lng, name); })
                (document.getElementById('globeContainer'));
            globe.pointOfView({ lat: 20, lng: 105, altitude: 2.5 });
            if (currentGeoJSON) renderBorders3D();
        }
        
        function initLeaflet2D() {
            if (leafletMap) return;
            leafletMap = L.map('leafletContainer').setView([20, 105], 3);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(leafletMap);
            if (currentGeoJSON) renderBorders2D();
        }
        
        function switchMapMode(mode) {
            currentMapMode = mode;
            const root = document.getElementById('mapContainerRoot');
            if (mode === '3d') {
                root.classList.remove('map-mode-2d');
                modeBtnText.textContent = '3D';
                if (!globe) initGlobe3D();
                else if (currentGeoJSON) renderBorders3D();
                if (leafletMap) leafletMap.invalidateSize();
            } else {
                root.classList.add('map-mode-2d');
                modeBtnText.textContent = '2D';
                initLeaflet2D();
                if (globe && currentGeoJSON) renderBorders2D();
            }
        }
        
        async function handleSubmit(e) {
            if(e) e.preventDefault();
            const query = searchInput.value.trim();
            if(!query) return;
            showLoading(true);
            try {
                const prompt = `You are a historian. Provide detailed info about "${query}" in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'} as JSON. For battle: {name,time,location,summary,outcome,significance,yearValue}. For figure: {name,time,location,biography,achievements,yearValue}. For landmark: {name,location,build_time,purpose,yearValue}. Only JSON.`;
                const result = await model.generateContent(prompt);
                let text = result.response.text();
                text = text.replace(/```json|```/g, '').trim();
                let data = JSON.parse(text);
                const container = document.createElement('div'); container.className = 'result-container';
                container.innerHTML = `<div class="result-title">${data.name || query}<span class="close-btn" onclick="this.parentElement.parentElement.remove()">✖</span></div><div class="result-content"></div>`;
                const contentDiv = container.querySelector('.result-content');
                let html = '<div class="info-panel-content">';
                if(data.time) html += `<p class="with-dot"><strong>${translations[currentLanguage].battle_time}:</strong> ${data.time}</p>`;
                if(data.location) html += `<p class="with-dot"><strong>${translations[currentLanguage].battle_location}:</strong> ${data.location}</p>`;
                if(data.summary) html += `<p class="with-dot"><strong>${translations[currentLanguage].battle_summary}:</strong> ${data.summary}</p>`;
                if(data.outcome) html += `<p class="with-dot"><strong>${translations[currentLanguage].battle_outcome}:</strong> ${data.outcome}</p>`;
                if(data.biography) html += `<p class="with-dot"><strong>${translations[currentLanguage].biography}:</strong> ${data.biography}</p>`;
                if(data.achievements) html += `<ul class="yellow-dot-list"><li>${data.achievements.join('</li><li>')}</li></ul>`;
                html += '</div>';
                contentDiv.innerHTML = html;
                resultMessages.prepend(container);
                if(data.yearValue && !isNaN(data.yearValue)) {
                    let targetYear = data.yearValue;
                    const idx = availableYears.findIndex(y => y.year >= targetYear);
                    if(idx !== -1) loadYear(idx);
                }
            } catch(err) { console.error(err); resultMessages.innerHTML = `<div class="result-container">${translations[currentLanguage].processing_error}</div>`; }
            finally { showLoading(false); searchInput.value = ''; }
        }
        
        // Event listeners
        timelineSlider.addEventListener('input', e => { const idx = Math.round((e.target.value/100)*(availableYears.length-1)); loadYear(idx); });
        sidebarToggleNew.addEventListener('click', () => { sidebar.classList.toggle('sidebar-collapsed'); const icon = sidebarToggleNew.querySelector('i'); icon.classList.toggle('fa-chevron-left'); icon.classList.toggle('fa-chevron-right'); sidebarToggleNew.classList.toggle('collapsed'); });
        infoPanelClose.addEventListener('click', () => infoPanel.classList.remove('visible'));
        countryInfoClose.addEventListener('click', () => countryInfoPanel.classList.remove('visible'));
        compactLangToggle.addEventListener('click', toggleLang);
        toggleMapModeBtn.addEventListener('click', () => switchMapMode(currentMapMode === '3d' ? '2d' : '3d'));
        searchForm.addEventListener('submit', handleSubmit);
        
        updateLanguage('vi');
        loadYear(30);
        setTimeout(() => { switchMapMode('3d'); }, 100);
        window.copyToClipboard = (btn) => { const code = decodeURIComponent(btn.getAttribute('data-code')); navigator.clipboard.writeText(code); btn.innerHTML = '<i class="fas fa-check"></i>'; setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 1000); };
    </script>
</body>
