<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Bản Đồ Lịch Sử</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Playfair Display', sans-serif;
            background-color: #DCEEF3;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        :root {
            --bg-total: #DCEEF3;
            --input-bg: #F4F7F8;
            --card-bg: #F8F9F6;
            --border-light: #E3E6E8;
            --text-primary: #333333;
            --text-secondary: #8A8F95;
            --button-cyan: #6EC6D9;
            --accent-orange: #F4A261;
        }
        
        #mapContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto !important;
        }
        
        #globeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto !important;
            display: none;
        }
        
        #app {
            display: flex;
            position: relative;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }
        
        /* Sidebar - 1/3 width max */
        #sidebar {
            width: 33.333%;
            max-width: 560px;
            min-width: 300px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
            position: absolute;
            left: 0;
            top: 0;
            z-index: 20;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-light);
            pointer-events: auto;
        }
        
        #sidebar.sidebar-collapsed {
            transform: translateX(-100%);
        }
        
        .sidebar-toggle-new {
            position: fixed;
            top: 20px;
            left: calc(33.333% - 22px);
            width: 44px;
            height: 44px;
            background-color: var(--accent-orange);
            color: white;
            border-radius: 0 50% 50% 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid var(--border-light);
            border-left: none;
            font-size: 20px;
        }
        
        .sidebar-toggle-new.collapsed {
            left: 0;
        }
        
        /* Header with controls */
        .sidebar-header {
            border-bottom: 1px solid var(--border-light);
            padding: 1rem;
            background-color: var(--card-bg);
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .header-title h2 {
            color: var(--accent-orange);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .language-switch {
            display: flex;
            align-items: center;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--input-bg);
            transition: .4s;
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 3px;
            background-color: var(--accent-orange);
            transition: .4s;
            border-radius: 50%;
            z-index: 2;
        }
        
        input:checked + .slider:before { transform: translateX(30px); }
        
        .map-type-icon {
            width: 36px;
            height: 36px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 18px;
        }
        
        .map-type-icon:hover {
            background: var(--accent-orange);
            color: white;
            transform: scale(1.05);
        }
        
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        
        #search-input {
            width: 100%;
            padding: 0.75rem 5rem 0.75rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            height: 48px;
            display: block;
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--accent-orange);
        }
        
        .search-button {
            position: absolute;
            top: 50%;
            right: 0.5rem;
            transform: translateY(-50%);
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .content-container {
            flex: 1;
            padding: 1rem;
            background-color: var(--bg-total);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        #result-messages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
            overflow-y: auto;
        }
        
        /* Country info in sidebar */
        .country-info-sidebar {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
        }
        
        .country-info-sidebar h3 {
            color: var(--accent-orange);
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .country-info-sidebar .close-country-info {
            float: right;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        
        .country-info-sidebar .close-country-info:hover {
            color: var(--accent-orange);
        }
        
        /* Top bar */
        .top-bar-globe {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: auto;
        }
        
        .year-pill-globe {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 10px 24px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            min-width: 120px;
            text-align: center;
        }
        
        /* Timeline */
        .timeline-globe {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 800px;
            z-index: 15;
            pointer-events: auto;
        }
        
        .timeline-bar-globe {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 13px 16px;
            border: 1px solid var(--border-light);
        }
        
        .timeline-slider-globe {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #555;
            outline: none;
            margin: 6px 0;
        }
        
        .timeline-slider-globe::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-orange);
            cursor: pointer;
        }
        
        .result-container {
            padding: 1.5rem;
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
            position: relative;
        }
        
        .result-container .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
            padding-right: 2rem;
            font-family: 'Playfair Display', serif;
        }
        
        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        
        .close-btn:hover {
            color: var(--accent-orange);
        }
        
        /* Audio controls */
        .audio-controls {
            display: flex;
            flex-direction: column;
            margin-top: 1rem;
            padding: 1rem;
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border-light);
        }
        
        .audio-controls-title {
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent-orange);
        }
        
        .audio-controls-buttons {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .audio-controls button {
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
        }
        
        .audio-controls button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
        }
        
        .audio-progress {
            flex-grow: 1;
            height: 6px;
            background-color: var(--border-light);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            margin-left: 0.5rem;
        }
        
        .audio-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--accent-orange);
            width: 0%;
        }
        
        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        .loading-screen.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner-box {
            width: 200px;
            height: 200px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes spin3D {
            from { transform: rotate3d(0.5, 0.5, 0.5, 360deg); }
            to { transform: rotate3d(0, 0, 0, 0deg); }
        }
        
        .leo-border-1 {
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(0deg, rgba(244, 162, 97, 0.1) 33%, #F4A261 100%);
            animation: spin3D 1.8s linear infinite;
        }
        
        .leo-border-2 {
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(0deg, rgba(110, 198, 217, 0.1) 33%, #6EC6D9 100%);
            animation: spin3D 2.2s linear infinite reverse;
        }
        
        .loading-text {
            margin-top: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #F4A261;
            text-align: center;
            font-family: 'Playfair Display', serif;
        }
        
        .custom-marker {
            background: var(--accent-orange);
            border: 2px solid white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            cursor: pointer;
        }
        
        .marker-popup {
            font-family: 'Inter', sans-serif;
            max-width: 300px;
        }
        
        .marker-popup strong {
            color: var(--accent-orange);
        }
        
        @media (max-width: 768px) {
            .timeline-globe { width: 90%; bottom: 20px; }
            #sidebar { width: 100%; max-width: 100%; }
            .sidebar-toggle-new { left: calc(100% - 44px); }
        }
    </style>
</head>
<body>

                    <div class="header-controls">
                        <div class="map-type-icon" id="mapTypeIcon">

                        <div class="language-switch">

                                <input type="checkbox" id="language-toggle">

    <div class="top-bar-globe" id="topBarGlobe">

            </div>

        }
        
        function toggleLanguage() {
            updateLanguage(languageToggle.checked ? 'en' : 'vi');
        }
        
        function showLoading() {
            loadingScreen.classList.add('active');
        }
        
        function hideLoading() {
            loadingScreen.classList.remove('active');
        }
        
        function toggleSidebar() {
            sidebar.classList.toggle('sidebar-collapsed');
            const icon = sidebarToggleNew.querySelector('i');
            if (sidebar.classList.contains('sidebar-collapsed')) {
                icon.classList.remove('fa-chevron-left');
                icon.classList.add('fa-chevron-right');
                sidebarToggleNew.classList.add('collapsed');
            } else {
                icon.classList.remove('fa-chevron-right');
                icon.classList.add('fa-chevron-left');
                sidebarToggleNew.classList.remove('collapsed');
            }
        }
        
        function showCountryInfoInSidebar(name, yearLabel) {
            if (sidebar.classList.contains('sidebar-collapsed')) {
                toggleSidebar();
            }
            
            countryInfoDisplay.innerHTML = `
                <div class="country-info-sidebar">
                    <span class="close-country-info" onclick="document.getElementById('country-info-display').innerHTML = '';">×</span>
                    <h3><i class="fas fa-flag"></i> ${name}</h3>
                    <p><strong>${translations[currentLanguage].country_info}:</strong> ${yearLabel}</p>
                    <div id="country-info-loading" style="text-align:center;padding:20px;">
                        <div style="width:30px;height:30px;margin:0 auto;border:3px solid #f3f3f3;border-top:3px solid #F4A261;border-radius:50%;animation:spin 1s linear infinite;"></div>
                    </div>
                </div>
            `;
            
            setTimeout(async () => {
                try {
                    const prompt = `Provide a brief history of ${name} around the year ${yearLabel} in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'}. Keep under 200 words. Format with bullet points.`;
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const content = response.text().replace(/\n/g, '<br>');
                    
                    countryInfoDisplay.innerHTML = `
                        <div class="country-info-sidebar">
                            <span class="close-country-info" onclick="document.getElementById('country-info-display').innerHTML = '';">×</span>
                            <h3><i class="fas fa-flag"></i> ${name}</h3>
                            <p><strong>${translations[currentLanguage].country_info}:</strong> ${yearLabel}</p>
                            <div style="font-size:14px; line-height:1.6;">${content}</div>
                            <p style="margin-top:10px; font-size:11px; color:var(--text-secondary);">${translations[currentLanguage].historical_context}</p>
                        </div>
                    `;
                } catch (error) {
                    countryInfoDisplay.innerHTML = `
                        <div class="country-info-sidebar">
                            <span class="close-country-info" onclick="document.getElementById('country-info-display').innerHTML = '';">×</span>
                            <h3><i class="fas fa-flag"></i> ${name}</h3>
                            <p>${translations[currentLanguage].processing_error}</p>
                        </div>
                    `;
                }
            }, 100);
        }
        
        function clearMarkers() {
            currentMarkers.forEach(marker => {
                if (map && marker.remove) marker.remove();
            });
            currentMarkers = [];
        }
        
        function addMarker(lat, lng, title, description, type) {
            if (!map || currentMapType !== '2d') return;
            
            const popupContent = `
                <div class="marker-popup">
                    <strong>${title}</strong><br>
                    <small>${description || ''}</small><br>
                    <span style="color: ${type === 'figure' ? '#F4A261' : type === 'battle' ? '#6EC6D9' : '#96CEB4'}">
                        ${type === 'figure' ? '👤 Nhân vật' : type === 'battle' ? '⚔️ Trận chiến' : '📍 Địa điểm'}
                    </span>
                </div>
            `;
            
            const marker = L.marker([lat, lng]).bindPopup(popupContent).addTo(map);
            currentMarkers.push(marker);
        }
        
        function initMap2D() {
            if (map) map.remove();
            mapContainer.style.display = 'block';
            globeContainer.style.display = 'none';
            
            map = L.map('mapContainer').setView([20, 105], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            
            if (currentGeoJSON) renderBorders2D(currentGeoJSON);
        }
        
        function initGlobe3D() {
            if (globe) globe._destructor();
            mapContainer.style.display = 'none';
            globeContainer.style.display = 'block';
            
            globe = Globe()
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .atmosphereColor('#3a7bd5')
                .atmosphereAltitude(0.25)
                .polygonsData([])
                .polygonAltitude(0.01)
                .polygonCapColor(d => d.color || '#444')
                .polygonSideColor(() => 'rgba(100,100,100,0.2)')
                .polygonStrokeColor(() => '#fff')
                .polygonLabel(d => {
                    let name = d.properties?.SUBJECTO || d.properties?.NAME || 'Không xác định';
                    return `<div style="font-family:'Inter',sans-serif;background:#F8F9F6;padding:8px 14px;border-radius:8px;border:1px solid #E3E6E8;color:#333;">${name}</div>`;
                })
                .onPolygonClick((polygon) => {
                    const name = polygon.properties?.SUBJECTO || polygon.properties?.NAME || 'Không xác định';
                    showCountryInfoInSidebar(name, availableYears[currentYearIndex].label);
                })
                (document.getElementById('globeContainer'));
            
            globe.pointOfView({ lat: 20, lng: 105, altitude: 2.5 });
            
            if (currentGeoJSON) renderBorders3D(currentGeoJSON);
        }
        
        function renderBorders2D(geojson) {
            if (!map) return;
            if (window.currentGeoLayer) map.removeLayer(window.currentGeoLayer);
            
            const countryColors = {};
            const features = geojson.features;
            
            features.forEach((feature, idx) => {
                const name = feature.properties?.SUBJECTO || feature.properties?.NAME || `region_${idx}`;
                countryColors[name] = colorPalette[idx % colorPalette.length];
            });
            
            window.currentGeoLayer = L.geoJSON(geojson, {
                style: (feature) => {
                    const name = feature.properties?.SUBJECTO || feature.properties?.NAME;
                    return {
                        color: '#333',
                        weight: 1.5,
                        fillColor: countryColors[name] || '#F4A261',
                        fillOpacity: 0.4,
                        opacity: 0.8
                    };
                },
                onEachFeature: (feature, layer) => {
                    const name = feature.properties?.SUBJECTO || feature.properties?.NAME || 'Không xác định';
                    layer.on('click', () => {
                        showCountryInfoInSidebar(name, availableYears[currentYearIndex].label);
                    });
                }
            }).addTo(map);
        }
        
        function renderBorders3D(geojson) {
            if (!globe) return;
            
            const polygons = geojson.features.map((f, i) => ({
                ...f,
                color: colorPalette[i % colorPalette.length] + '99'
            }));
            globe.polygonsData(polygons);
        }
        
        async function loadYear(index) {
            if (index < 0 || index >= availableYears.length) return;
            currentYearIndex = index;
            const yearData = availableYears[index];
            yearDisplay.textContent = yearData.label;
            timelineSlider.value = (index / (availableYears.length - 1)) * 100;
            
            if (!dataCache[yearData.file]) {
                try {
                    const response = await fetch(`data/geojson/${yearData.file}`);
                    if (!response.ok) throw new Error('HTTP error');
                    dataCache[yearData.file] = await response.json();
                } catch (err) {
                    console.error('Error loading GeoJSON:', err);
                    return;
                }
            }
            
            currentGeoJSON = dataCache[yearData.file];
            if (currentMapType === '2d' && map) renderBorders2D(currentGeoJSON);
            else if (currentMapType === '3d' && globe) renderBorders3D(currentGeoJSON);
        }
        
        function toggleMapType() {
            currentMapType = currentMapType === '2d' ? '3d' : '2d';
            const icon = mapTypeIcon.querySelector('i');
            if (currentMapType === '2d') {
                icon.classList.remove('fa-globe');
                icon.classList.add('fa-map');
                initMap2D();
            } else {
                icon.classList.remove('fa-map');
                icon.classList.add('fa-globe');
                initGlobe3D();
            }
            if (currentGeoJSON) {
                if (currentMapType === '2d') renderBorders2D(currentGeoJSON);
                else renderBorders3D(currentGeoJSON);
            }
            clearMarkers();
        }
        
        async function handleSearch(e) {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (!query) return;
            
            searchInput.value = '';
            showLoading();
            clearMarkers();
            
            try {
                const prompt = `Respond with JSON only. Provide information about "${query}" in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'}.
                If it's a historical figure, battle, or landmark, include location coordinates (lat, lng).
                JSON structure: {
                    "name": "name",
                    "type": "figure/battle/landmark",
                    "time": "time period",
                    "location": "location name",
                    "lat": number,
                    "lng": number,
                    "summary": "brief description",
                    "factions": ["list of factions if battle"],
                    "outcome": "outcome if battle",
                    "significance": "historical significance"
                }`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                let text = response.text();
                text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                const data = JSON.parse(text);
                
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result-container';
                resultDiv.innerHTML = `
                    <div class="result-title">${data.name || query}</div>
                    <div class="close-btn" onclick="this.parentElement.remove()">×</div>
                    <div class="result-content">
                        ${data.time ? `<p><strong>${translations[currentLanguage].battle_time}:</strong> ${data.time}</p>` : ''}
                        ${data.location ? `<p><strong>${translations[currentLanguage].battle_location}:</strong> ${data.location}</p>` : ''}
                        ${data.summary ? `<p><strong>${translations[currentLanguage].battle_summary}:</strong> ${data.summary}</p>` : ''}
                        ${data.factions ? `<p><strong>${translations[currentLanguage].battle_factions}:</strong> ${data.factions.join(', ')}</p>` : ''}
                        ${data.outcome ? `<p><strong>${translations[currentLanguage].battle_outcome}:</strong> ${data.outcome}</p>` : ''}
                        ${data.significance ? `<p><strong>${translations[currentLanguage].battle_significance}:</strong> ${data.significance}</p>` : ''}
                    </div>
                `;
                resultMessages.prepend(resultDiv);
                
                if (data.lat && data.lng) {
                    addMarker(data.lat, data.lng, data.name, data.location, data.type);
                    if (currentMapType === '2d' && map) map.setView([data.lat, data.lng], 6);
                    else if (currentMapType === '3d' && globe) globe.pointOfView({ lat: data.lat, lng: data.lng, altitude: 1.5 });
                }
                
                if (data.time) {
                    const yearMatch = data.time.match(/\d+/);
                    if (yearMatch) {
                        const targetYear = parseInt(yearMatch[0]);
                        const isBC = data.time.includes('TCN') || data.time.includes('BC');
                        const yearValue = isBC ? -targetYear : targetYear;
                        const targetIndex = availableYears.findIndex(y => y.year >= yearValue);
                        if (targetIndex !== -1) await loadYear(targetIndex);
                    }
                }
            } catch (error) {
                console.error('Search error:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'result-container';
                errorDiv.innerHTML = `
                    <div class="result-title">${translations[currentLanguage].processing_error}</div>
                    <div class="close-btn" onclick="this.parentElement.remove()">×</div>
                `;
                resultMessages.prepend(errorDiv);
            } finally {
                hideLoading();
            }
        }
        
        function setupEventListeners() {
            searchForm.addEventListener('submit', handleSearch);
            sidebarToggleNew.addEventListener('click', toggleSidebar);
            mapTypeIcon.addEventListener('click', toggleMapType);
            languageToggle.addEventListener('change', toggleLanguage);
            
            timelineSlider.addEventListener('input', (e) => {
                const index = Math.round((e.target.value / 100) * (availableYears.length - 1));
                loadYear(index);
            });
        }
        
        async function init() {
            updateLanguage('vi');
            initMap2D();
            setupEventListeners();
            await loadYear(30);
            
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
                if (globe) {
                    globe.width(window.innerWidth);
                    globe.height(window.innerHeight);
                }
            });
        }
        
        init();
    </script>
</body>
</html>
