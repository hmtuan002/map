<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Bản Đồ Lịch Sử</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Globe.gl CSS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Playfair Display', sans-serif;
            background-color: #DCEEF3 !important;
            color: #333333;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        :root {
            --bg-total: #DCEEF3;
            --input-bg: #F4F7F8;
            --card-bg: #F8F9F6;
            --border-light: #E3E6E8;
            --text-primary: #333333;
            --text-secondary: #8A8F95;
            --button-cyan: #6EC6D9;
            --accent-orange: #F4A261;
        }
        
        .bg-total { background-color: var(--bg-total) !important; }
        .bg-input { background-color: var(--input-bg) !important; }
        .bg-card { background-color: var(--card-bg) !important; }
        .border-custom { border-color: var(--border-light) !important; }
        .text-primary { color: var(--text-primary) !important; }
        .text-secondary { color: var(--text-secondary) !important; }
        .bg-button { background-color: var(--button-cyan) !important; }
        .text-accent { color: var(--accent-orange) !important; }
        .border-accent { border-color: var(--accent-orange) !important; }
        .bg-accent { background-color: var(--accent-orange) !important; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #mapContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto !important;
        }
        
        #globeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto !important;
            display: none;
        }
        
        #app {
            display: flex;
            position: relative;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
        }
        
        /* ===== SIDEBAR - 1/3 WIDTH MAX ===== */
        #sidebar {
            width: 33.333%;
            max-width: 560px;
            min-width: 300px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
            position: absolute;
            left: 0;
            top: 0;
            z-index: 20;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-light);
            pointer-events: auto;
        }
        
        #sidebar.sidebar-collapsed {
            transform: translateX(-100%);
            position: absolute;
            left: -100%;
        }
        
        /* ===== NÚT ĐÓNG/MỞ SIDEBAR ===== */
        .sidebar-toggle-new {
            position: fixed;
            top: 20px;
            left: calc(33.333% - 22px);
            width: 44px;
            height: 44px;
            background-color: var(--accent-orange);
            color: white;
            border-radius: 0 50% 50% 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid var(--border-light);
            border-left: none;
            font-size: 20px;
        }
        
        .sidebar-toggle-new:hover {
            background-color: #e08e4d;
            transform: scale(1.05);
        }
        
        .sidebar-toggle-new.collapsed {
            left: 0;
        }
        
        /* ===== MAP TYPE BUTTON ===== */
        .map-type-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            position: fixed;
            bottom: 100px;
            right: 20px;
            z-index: 15;
        }
        
        .map-type-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }
        
        .map-type-btn.active {
            background: var(--accent-orange);
            color: white;
        }
        
        /* ===== INFO PANEL CONTENT ===== */
        .info-panel-content {
            padding: 16px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .info-section {
            margin-bottom: 20px;
            animation: fadeInUp 0.3s ease;
        }
        
        .section-title {
            color: var(--accent-orange);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(244, 162, 97, 0.2);
            font-family: 'Playfair Display', serif;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 8px;
            color: var(--accent-orange);
        }
        
        .yellow-dot-list {
            list-style: none;
            padding: 0;
            margin: 8px 0;
        }
        
        .yellow-dot-list li {
            position: relative;
            padding: 6px 0 6px 28px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            border-bottom: 1px dashed rgba(244, 162, 97, 0.1);
            transition: all 0.2s ease;
        }
        
        .yellow-dot-list li::before {
            content: "●";
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-orange);
            font-size: 14px;
        }
        
        .with-dot {
            position: relative;
            padding-left: 28px;
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .with-dot::before {
            content: "●";
            position: absolute;
            left: 8px;
            top: 0;
            color: var(--accent-orange);
            font-size: 14px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ===== COUNTRY INFO PANEL ===== */
        .country-info-panel-left {
            position: fixed;
            top: 20px;
            left: calc(33.333% + 20px);
            width: 520px;
            max-width: 90vw;
            max-height: 80vh;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            pointer-events: auto;
            transition: left 0.3s ease;
        }
        
        .country-info-panel-left.visible {
            display: block;
        }
        
        .country-info-panel-left .country-info-header {
            padding: 16px;
            background: linear-gradient(135deg, var(--button-cyan) 0%, var(--accent-orange) 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        
        .country-info-panel-left .header-icon {
            font-size: 24px;
            color: white;
        }
        
        .country-info-panel-left .header-title {
            flex: 1;
            font-weight: 600;
            font-size: 18px;
            color: white;
            padding-right: 30px;
            font-family: 'Playfair Display', serif;
        }
        
        .country-info-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.8;
            line-height: 1;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .country-info-content {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }
        
        /* ===== INFO PANEL ===== */
        .info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 540px;
            max-width: 90vw;
            max-height: 80vh;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .info-panel.visible { display: block; }
        
        .info-header {
            padding: 16px;
            background: linear-gradient(135deg, var(--button-cyan) 0%, var(--accent-orange) 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        
        .info-header-icon {
            font-size: 24px;
            color: white;
        }
        
        .info-header-title {
            flex: 1;
            font-weight: 600;
            font-size: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: white;
            padding-right: 30px;
        }
        
        .info-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.8;
            line-height: 1;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .info-content {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }
        
        /* ===== TOP BAR ===== */
        .top-bar-globe {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 15;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 10px;
            width: max-content;
            max-width: 90%;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }
        
        .year-pill-globe {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 10px 24px;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 600;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            min-width: 120px;
            text-align: center;
        }
        
        /* ===== TIMELINE ===== */
        .timeline-globe {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 800px;
            z-index: 15;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }
        
        .timeline-bar-globe {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 13px 16px;
            border: 1px solid var(--border-light);
        }
        
        .timeline-slider-globe {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #555;
            outline: none;
            margin: 6px 0;
        }
        
        .timeline-slider-globe::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-orange);
            cursor: pointer;
        }
        
        .playback-controls-globe {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .playback-btn-globe {
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .playback-btn-globe:hover {
            background: rgba(255,255,255,0.8);
        }
        
        .playback-btn-globe.active {
            background: var(--accent-orange);
            color: white;
        }
        
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        /* ===== SIDEBAR CONTENT ===== */
        .sidebar-header {
            border-bottom: 1px solid var(--border-light);
            padding: 1rem;
            background-color: var(--card-bg);
            position: relative;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: relative;
        }
        
        .header-title h2 {
            color: var(--accent-orange);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
        }
        
        .language-switch {
            display: flex;
            align-items: center;
            margin-right: 30px;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--input-bg);
            transition: .4s;
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 3px;
            background-color: var(--accent-orange);
            transition: .4s;
            border-radius: 50%;
            z-index: 2;
        }
        
        input:checked + .slider:before { transform: translateX(30px); }
        
        .search-wrapper {
            position: relative;
            margin-bottom: 1rem;
            margin-top: 1rem;
            width: 100%;
        }
        
        #search-input {
            width: 100%;
            padding: 0.75rem 5rem 0.75rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            transition: all 0.2s;
            height: 48px;
            display: block;
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--accent-orange);
        }
        
        .search-button {
            position: absolute;
            top: 50%;
            right: 0.5rem;
            transform: translateY(-50%);
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .content-container {
            flex: 1;
            padding: 1rem;
            background-color: var(--bg-total);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        #result-messages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 1rem;
        }
        
        /* ===== SIDEBAR BUTTONS ===== */
        .sidebar-buttons {
            display: flex;
            gap: 10px;
            padding: 0 1rem 1rem 1rem;
            border-bottom: 1px solid var(--border-light);
        }
        
        .sidebar-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        
        .sidebar-btn:hover {
            background: var(--button-cyan);
            color: white;
            border-color: var(--button-cyan);
        }
        
        .sidebar-btn.active {
            background: var(--accent-orange);
            color: white;
            border-color: var(--accent-orange);
        }
        
        /* ===== MARKER STYLES ===== */
        .custom-marker {
            background: var(--accent-orange);
            border: 2px solid white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .custom-marker:hover {
            transform: scale(1.5);
        }
        
        .marker-popup {
            font-family: 'Inter', sans-serif;
            max-width: 300px;
        }
        
        .marker-popup strong {
            color: var(--accent-orange);
        }
        
        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            pointer-events: none;
        }
        
        .loading-screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .spinner-box {
            width: 200px;
            height: 200px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes spin3D {
            from { transform: rotate3d(0.5, 0.5, 0.5, 360deg); }
            to { transform: rotate3d(0, 0, 0, 0deg); }
        }
        
        .leo-border-1 {
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(0deg, rgba(244, 162, 97, 0.1) 33%, #F4A261 100%);
            animation: spin3D 1.8s linear infinite;
        }
        
        .leo-border-2 {
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(0deg, rgba(110, 198, 217, 0.1) 33%, #6EC6D9 100%);
            animation: spin3D 2.2s linear infinite reverse;
        }
        
        .loading-text {
            margin-top: 30px;
            font-size: 20px;
            font-weight: 600;
            color: #F4A261;
            text-align: center;
            font-family: 'Playfair Display', serif;
        }
        
        .result-container {
            padding: 1.5rem;
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
            position: relative;
        }
        
        .result-container .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
            padding-right: 2rem;
            font-family: 'Playfair Display', serif;
        }
        
        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        
        .close-btn:hover {
            color: var(--accent-orange);
        }
        
        /* ===== AUDIO CONTROLS ===== */
        .audio-controls {
            display: flex;
            flex-direction: column;
            margin-top: 1rem;
            padding: 1rem;
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border-light);
            width: 100%;
        }
        
        .audio-controls-title {
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent-orange);
            font-size: 1rem;
        }
        
        .audio-controls-buttons {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .audio-controls button {
            background-color: var(--button-cyan);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .audio-controls button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
        }
        
        .audio-progress {
            flex-grow: 1;
            height: 6px;
            background-color: var(--border-light);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
            margin-left: 0.5rem;
        }
        
        .audio-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--accent-orange);
            width: 0%;
        }
        
        @media (max-width: 768px) {
            .timeline-globe { width: 90%; bottom: 20px; }
            #sidebar { width: 100%; max-width: 100%; }
            .sidebar-toggle-new { left: calc(100% - 44px); }
            .country-info-panel-left { left: 20px; width: calc(100% - 40px); }
        }
    </style>
</head>
<body>
    <div id="globeContainer"></div>
    <div id="mapContainer"></div>
    
    <div class="country-info-panel-left" id="countryInfoPanel">
        <div class="country-info-header">
            <span class="header-icon"><i class="fas fa-flag"></i></span>

        const translations = {

                close: "Close"
            }
        };
        
        function updateLanguage(lang) {
            currentLanguage = lang;
            searchInput.placeholder = translations[lang].search_placeholder;
            mainTitleText.textContent = translations[lang].title;
            languageToggle.checked = lang === 'en';
            bordersBtn.innerHTML = `<i class="fas fa-draw-polygon"></i><span>${translations[lang].borders}</span>`;
        }
        
        function toggleLanguage() {
            updateLanguage(languageToggle.checked ? 'en' : 'vi');
        }
        
        function showLoading() {
            loadingScreen.classList.add('active');
        }
        
        function hideLoading() {
            loadingScreen.classList.remove('active');
        }
        
        function toggleSidebar() {
            sidebar.classList.toggle('sidebar-collapsed');
            const icon = sidebarToggleNew.querySelector('i');
            if (sidebar.classList.contains('sidebar-collapsed')) {
                icon.classList.remove('fa-chevron-left');
                icon.classList.add('fa-chevron-right');
                sidebarToggleNew.classList.add('collapsed');
            } else {
                icon.classList.remove('fa-chevron-right');
                icon.classList.add('fa-chevron-left');
                sidebarToggleNew.classList.remove('collapsed');
            }
        }
        
        function clearMarkers() {
            currentMarkers.forEach(marker => {
                if (map && marker.remove) marker.remove();
                if (globe && marker.destroy) marker.destroy();
            });
            currentMarkers = [];
        }
        
        function addMarker(lat, lng, title, description, type) {
            const popupContent = `
                <div class="marker-popup">
                    <strong>${title}</strong><br>
                    <small>${description || ''}</small><br>
                    <span style="color: ${type === 'figure' ? '#F4A261' : type === 'battle' ? '#6EC6D9' : '#96CEB4'}">
                        ${type === 'figure' ? '👤 Nhân vật' : type === 'battle' ? '⚔️ Trận chiến' : '📍 Địa điểm'}
                    </span>
                </div>
            `;
            
            if (currentMapType === '2d' && map) {
                const marker = L.marker([lat, lng]).bindPopup(popupContent).addTo(map);
                currentMarkers.push(marker);
            } else if (currentMapType === '3d' && globe) {
                // 3D marker using HTML div
                const markerDiv = document.createElement('div');
                markerDiv.style.width = '12px';
                markerDiv.style.height = '12px';
                markerDiv.style.backgroundColor = type === 'figure' ? '#F4A261' : type === 'battle' ? '#6EC6D9' : '#96CEB4';
                markerDiv.style.border = '2px solid white';
                markerDiv.style.borderRadius = '50%';
                markerDiv.style.cursor = 'pointer';
                markerDiv.title = title;
                
                const label = globe.htmlElementsData([{
                    lat: lat,
                    lng: lng,
                    html: markerDiv,
                    title: title
                }]);
                currentMarkers.push(label);
            }
        }
        
        function initMap2D() {
            if (map) map.remove();
            mapContainer.style.display = 'block';
            globeContainer.style.display = 'none';
            
            map = L.map('mapContainer').setView([20, 105], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            
            if (currentGeoJSON) renderBorders2D(currentGeoJSON);
        }
        
        function initGlobe3D() {
            if (globe) globe._destructor();
            mapContainer.style.display = 'none';
            globeContainer.style.display = 'block';
            
            globe = Globe()
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .atmosphereColor('#3a7bd5')
                .atmosphereAltitude(0.25)
                .polygonsData([])
                .polygonAltitude(0.01)
                .polygonCapColor(d => d.color || '#444')
                .polygonSideColor(() => 'rgba(100,100,100,0.2)')
                .polygonStrokeColor(() => '#fff')
                .polygonLabel(d => {
                    let name = d.properties?.SUBJECTO || d.properties?.NAME || 'Không xác định';
                    return `<div style="font-family:'Inter',sans-serif;background:#F8F9F6;padding:8px 14px;border-radius:8px;border:1px solid #E3E6E8;color:#333;">${name}</div>`;
                })
                .onPolygonClick((polygon, event, coords) => {
                    const name = polygon.properties?.SUBJECTO || polygon.properties?.NAME || 'Không xác định';
                    showCountryInfo(name);
                })
                (document.getElementById('globeContainer'));
            
            globe.pointOfView({ lat: 20, lng: 105, altitude: 2.5 });
            
            if (currentGeoJSON && showBorders) renderBorders3D(currentGeoJSON);
        }
        
        function renderBorders2D(geojson) {
            if (!map) return;
            if (window.currentGeoLayer) map.removeLayer(window.currentGeoLayer);
            
            window.currentGeoLayer = L.geoJSON(geojson, {
                style: {
                    color: '#F4A261',
                    weight: 1,
                    fillColor: '#F4A261',
                    fillOpacity: 0.3
                },
                onEachFeature: (feature, layer) => {
                    const name = feature.properties?.SUBJECTO || feature.properties?.NAME || 'Không xác định';
                    layer.bindPopup(`<strong>${name}</strong>`);
                    layer.on('click', () => showCountryInfo(name));
                }
            }).addTo(map);
        }
        
        function renderBorders3D(geojson) {
            if (!globe || !showBorders) {
                if (globe && !showBorders) globe.polygonsData([]);
                return;
            }
            
            const polygons = geojson.features.map((f, i) => ({
                ...f,
                color: colorPalette[i % colorPalette.length] + '99'
            }));
            globe.polygonsData(polygons);
        }
        
        function showCountryInfo(name) {
            countryInfoTitle.textContent = name;
            countryInfoContent.innerHTML = `
                <p>${translations[currentLanguage].historical_context}</p>
                <p><strong>${name}</strong> - ${availableYears[currentYearIndex].label}</p>
                <p>Đang tải thông tin lịch sử...</p>
            `;
            countryInfoPanel.classList.add('visible');
            
            setTimeout(async () => {
                try {
                    const prompt = `Provide a brief history of ${name} around the year ${availableYears[currentYearIndex].label} in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'}. Keep under 150 words.`;
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    countryInfoContent.innerHTML = `
                        <p>${translations[currentLanguage].historical_context}</p>
                        <p><strong>${name}</strong> - ${availableYears[currentYearIndex].label}</p>
                        <p>${response.text()}</p>
                    `;
                } catch (error) {
                    countryInfoContent.innerHTML = `<p>${translations[currentLanguage].processing_error}</p>`;
                }
            }, 100);
        }
        
        async function loadYear(index) {
            if (index < 0 || index >= availableYears.length) return;
            currentYearIndex = index;
            const yearData = availableYears[index];
            document.getElementById('yearDisplay').textContent = yearData.label;
            document.getElementById('timelineSlider').value = (index / (availableYears.length - 1)) * 100;
            
            if (!dataCache[yearData.file]) {
                try {
                    const response = await fetch(`data/geojson/${yearData.file}`);
                    if (!response.ok) throw new Error('HTTP error');
                    dataCache[yearData.file] = await response.json();
                } catch (err) {
                    console.error('Error loading GeoJSON:', err);
                    return;
                }
            }
            
            currentGeoJSON = dataCache[yearData.file];
            if (currentMapType === '2d' && map) renderBorders2D(currentGeoJSON);
            else if (currentMapType === '3d' && globe) renderBorders3D(currentGeoJSON);
        }
        
        function toggleMapType() {
            currentMapType = currentMapType === '2d' ? '3d' : '2d';
            const icon = mapTypeBtn.querySelector('i');
            if (currentMapType === '2d') {
                icon.classList.remove('fa-globe');
                icon.classList.add('fa-map');
                initMap2D();
            } else {
                icon.classList.remove('fa-map');
                icon.classList.add('fa-globe');
                initGlobe3D();
            }
            if (currentGeoJSON) {
                if (currentMapType === '2d') renderBorders2D(currentGeoJSON);
                else renderBorders3D(currentGeoJSON);
            }
        }
        
        function toggleBorders() {
            showBorders = !showBorders;
            bordersBtn.classList.toggle('active', showBorders);
            if (currentGeoJSON) {
                if (currentMapType === '2d' && map) {
                    if (window.currentGeoLayer) map.removeLayer(window.currentGeoLayer);
                    if (showBorders) renderBorders2D(currentGeoJSON);
                } else if (currentMapType === '3d' && globe) {
                    renderBorders3D(showBorders ? currentGeoJSON : null);
                }
            }
        }
        
        async function handleSearch(e) {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (!query) return;
            
            searchInput.value = '';
            showLoading();
            clearMarkers();
            
            try {
                const prompt = `Respond with JSON only. Provide information about "${query}" in ${currentLanguage === 'vi' ? 'Vietnamese' : 'English'}.
                If it's a historical figure, battle, or landmark, include location coordinates (lat, lng).
                JSON structure: {
                    "name": "name",
                    "type": "figure/battle/landmark",
                    "time": "time period",
                    "location": "location name",
                    "lat": number,
                    "lng": number,
                    "summary": "brief description",
                    "factions": ["list of factions if battle"],
                    "outcome": "outcome if battle",
                    "significance": "historical significance"
                }`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                let text = response.text();
                text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                const data = JSON.parse(text);
                
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result-container';
                resultDiv.innerHTML = `
                    <div class="result-title">${data.name || query}</div>
                    <div class="close-btn" onclick="this.parentElement.remove()">×</div>
                    <div class="result-content">
                        ${data.time ? `<p><strong>${translations[currentLanguage].battle_time}:</strong> ${data.time}</p>` : ''}
                        ${data.location ? `<p><strong>${translations[currentLanguage].battle_location}:</strong> ${data.location}</p>` : ''}
                        ${data.summary ? `<p><strong>${translations[currentLanguage].battle_summary}:</strong> ${data.summary}</p>` : ''}
                        ${data.factions ? `<p><strong>${translations[currentLanguage].battle_factions}:</strong> ${data.factions.join(', ')}</p>` : ''}
                        ${data.outcome ? `<p><strong>${translations[currentLanguage].battle_outcome}:</strong> ${data.outcome}</p>` : ''}
                        ${data.significance ? `<p><strong>${translations[currentLanguage].battle_significance}:</strong> ${data.significance}</p>` : ''}
                    </div>
                `;
                resultMessages.appendChild(resultDiv);
                
                if (data.lat && data.lng) {
                    addMarker(data.lat, data.lng, data.name, data.location, data.type);
                    if (currentMapType === '2d' && map) map.setView([data.lat, data.lng], 6);
                    else if (currentMapType === '3d' && globe) globe.pointOfView({ lat: data.lat, lng: data.lng, altitude: 1.5 });
                }
                
                if (data.time) {
                    const yearMatch = data.time.match(/\d+/);
                    if (yearMatch) {
                        const targetYear = parseInt(yearMatch[0]);
                        const isBC = data.time.includes('TCN') || data.time.includes('BC');
                        const yearValue = isBC ? -targetYear : targetYear;
                        const targetIndex = availableYears.findIndex(y => y.year >= yearValue);
                        if (targetIndex !== -1) await loadYear(targetIndex);
                    }
                }
            } catch (error) {
                console.error('Search error:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'result-container';
                errorDiv.innerHTML = `
                    <div class="result-title">${translations[currentLanguage].processing_error}</div>
                    <div class="close-btn" onclick="this.parentElement.remove()">×</div>
                `;
                resultMessages.appendChild(errorDiv);
            } finally {
                hideLoading();
            }
        }
        
        function setupEventListeners() {
            searchForm.addEventListener('submit', handleSearch);
            sidebarToggleNew.addEventListener('click', toggleSidebar);
            bordersBtn.addEventListener('click', toggleBorders);
            mapTypeBtn.addEventListener('click', toggleMapType);
            languageToggle.addEventListener('change', toggleLanguage);
            infoPanelClose.addEventListener('click', () => infoPanel.classList.remove('visible'));
            countryInfoClose.addEventListener('click', () => countryInfoPanel.classList.remove('visible'));
            
            document.getElementById('timelineSlider').addEventListener('input', (e) => {
                const index = Math.round((e.target.value / 100) * (availableYears.length - 1));
                loadYear(index);
            });
            
            document.getElementById('prevBtn').addEventListener('click', () => loadYear(Math.max(0, currentYearIndex - 1)));
            document.getElementById('nextBtn').addEventListener('click', () => loadYear(Math.min(availableYears.length - 1, currentYearIndex + 1)));
            document.getElementById('playBtn').addEventListener('click', () => {
                isPlaying = !isPlaying;
                const btn = document.getElementById('playBtn');
                if (isPlaying) {
                    btn.textContent = '⏸️';
                    playInterval = setInterval(() => {
                        let next = currentYearIndex + 1;
                        if (next >= availableYears.length) next = 0;
                        loadYear(next);
                    }, 2000);
                } else {
                    btn.textContent = '▶️';
                    clearInterval(playInterval);
                }
            });
        }
        
        async function init() {
            updateLanguage('vi');
            initMap2D();
            setupEventListeners();
            await loadYear(30);
            
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
                if (globe) {
                    globe.width(window.innerWidth);
                    globe.height(window.innerHeight);
                }
            });
        }
        
        init();
    </script>
</body>
</html>
